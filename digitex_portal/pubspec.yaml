name: digitex_portal
description: Digitex Portal — mobile companion for Digitex SMS (gate, pickup, student portal, staff tools).
publish_to: 'none'
version: 2.1.0+21

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
